[project]
site_name = "Duc's Digital Workspace"
site_url = "https://dotfiles.vanducng.dev/"
site_description = "AI-enhanced development environment for macOS featuring tiling window management, advanced terminal workflows, and integrated AI coding assistance."
site_author = "vanducng"
copyright = "© 2024-2026 vanducng. MIT License."
repo_url = "https://github.com/vanducng/dotfiles"
repo_name = "vanducng/dotfiles"
docs_dir = "docs"
site_dir = "site"
extra_css = ["stylesheets/dotfiles.css"]

[project.theme]
variant = "modern"
language = "en"
features = [
  "content.code.copy",
  "content.tabs.link",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.path",
  "navigation.sections",
  "navigation.tabs",
  "toc.follow"
]

[[project.theme.palette]]
scheme = "default"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/moon"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/sun"
toggle.name = "Switch to light mode"

[project.markdown_extensions.attr_list]

[project.markdown_extensions.md_in_html]

[[project.nav]]
Home = "index.md"

[[project.nav]]
"Getting Started" = [
  "installation.md",
  "quick-reference.md"
]

[[project.nav]]
"Core Tools" = [
  { Neovim = "neovim/README.md" },
  { Tmux = "tmux.md" },
  { Atuin = "atuin.md" },
  { SKHD = "skhd.md" },
  { "Zen Mode" = "zen-mode.md" }
]

[[project.nav]]
"AI Tools" = [
  { Overview = "ai/index.md" },
  { Codex = "ai/codex.md" },
  { Workflows = "ai/workflows.md" },
  { "Best Practices" = "ai/best-practices.md" }
]

[[project.nav]]
Workflows = [
  { Overview = "workflows/index.md" },
  { Coding = "workflows/coding.md" },
  { Database = "workflows/database.md" },
  { "Review & Debug" = "workflows/review.md" }
]

[[project.nav]]
Troubleshooting = [
  { Overview = "troubleshooting/index.md" },
  { "Window Management" = "troubleshooting/window-management.md" },
  { Terminal = "troubleshooting/terminal.md" },
  { Neovim = "troubleshooting/neovim.md" },
  { "AI Tools" = "troubleshooting/ai-tools.md" },
  { Performance = "troubleshooting/performance.md" }
]

[[project.nav]]
Reference = [
  { "Codebase Summary" = "codebase-summary.md" }
]
