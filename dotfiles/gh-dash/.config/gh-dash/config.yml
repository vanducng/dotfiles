# yaml-language-server: $schema=https://gh-dash.dev/schema.json
prSections:
    - title: My Pull Requests
      filters: is:open author:@me
    - title: Needs My Review
      filters: is:open review-requested:@me
    - title: Involved
      filters: is:open involves:@me -author:@me
issuesSections:
    - title: My Issues
      filters: is:open author:@me
    - title: Assigned
      filters: is:open assignee:@me
    - title: Involved
      filters: is:open involves:@me -author:@me
notificationsSections:
    - title: All
      filters: ""
    - title: Created
      filters: reason:author
    - title: Participating
      filters: reason:participating
    - title: Mentioned
      filters: reason:mention
    - title: Review Requested
      filters: reason:review-requested
    - title: Assigned
      filters: reason:assign
    - title: Subscribed
      filters: reason:subscribed
    - title: Team Mentioned
      filters: reason:team-mention
repo:
    branchesRefetchIntervalSeconds: 30
    prsRefetchIntervalSeconds: 60
defaults:
    preview:
        open: true
        width: 0.45
    prsLimit: 20
    prApproveComment: LGTM
    issuesLimit: 20
    notificationsLimit: 20
    view: prs
    layout:
        prs:
            updatedAt:
                width: 5
            createdAt:
                width: 5
            repo:
                width: 20
            author:
                width: 15
            authorIcon:
                hidden: false
            assignees:
                width: 20
                hidden: true
            base:
                width: 15
                hidden: true
            lines:
                width: 15
        issues:
            updatedAt:
                width: 5
            createdAt:
                width: 5
            repo:
                width: 15
            creator:
                width: 10
            creatorIcon:
                hidden: false
            assignees:
                width: 20
                hidden: true
    refetchIntervalMinutes: 30
keybindings:
    universal:
        - key: g
          name: lazygit
          command: >
            cd {{.RepoPath}}; lazygit
    prs:
        - key: C
          name: code review
          command: >
            tmux new-window -n "CR-{{.PrNumber}}"
            "claude '/review-pr https://github.com/{{.RepoName}}/pull/{{.PrNumber}}'"
        - key: T
          name: github action
          command: >-
            tmux new-window -n "GHA-{{.PrNumber}}"
            "gh enhance -R {{.RepoName}} {{.PrNumber}}"
repoPaths: {}
# Theme matches ghostty `duskfox` (nightfox/rosé-pine-moon family) for visual coherence
theme:
    ui:
        sectionsShowCount: true
        table:
            showSeparator: true
            compact: false
    colors:
        text:
            primary: "#e0def4"
            secondary: "#9ccfd8"
            inverted: "#232136"
            faint: "#59546d"
            warning: "#eb6f92"
            success: "#a3be8c"
            actor: "#c4a7e7"
        background:
            selected: "#393552"
        border:
            primary: "#569fba"
            secondary: "#c4a7e7"
            faint: "#2d2a45"
        inline:
            icons:
                newcontributor: "#a3be8c"
                contributor: "#9ccfd8"
                collaborator: "#f6c177"
                member: "#c4a7e7"
                owner: "#ea9a97"
                unknownrole: "#59546d"
    icons:
        inline:
            newcontributor: "󰎔"
            contributor: ""
            collaborator: ""
            member: ""
            owner: ""
            unknownrole: "󰭙"
# diffnav: file-tree + delta-rendered side-by-side diff (à la GitHub)
pager:
    diff: diffnav
confirmQuit: false
showAuthorIcons: true
smartFilteringAtLaunch: true
includeReadNotifications: true
