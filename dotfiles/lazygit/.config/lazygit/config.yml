git:
  paging:
    colorArg: always
    pager: delta --paging=never --side-by-side --line-numbers
gui:
  language: "en"
  theme:
    activeBordercolor:
      - "#34302c"
      - bold
    inactiveBordercolor:
      - "#bd8183"
    optionsTextColor:
      - "#89b4f4"
    selectedLineBgColor:
      - "#3e8fb0"
    selectedRangeBgColor:
      - "#3e8fb0"
    cherryPickedCommitBgColor:
      - "#403a46"
    cherryPickedCommitFgColor:
      - "#403a46"
    unstagedChangesColor:
      - "#e49b5d"
    defaultFgColor:
      - "#ece1d7"
os:
  edit: '[[ -z "$NVIM" ]] && { nvim {{filename}} &>/dev/tty; true; } || { nvim -u NONE --server $NVIM --remote-expr "execute(\"ToggleTerm\")" && nvim -u NONE --server $NVIM --remote {{filename}}; }'
  editAtLine: '[[ -z "$NVIM" ]] && { nvim +{{line}} {{filename}} &>/dev/tty; true; } || { nvim -u NONE --server $NVIM --remote-expr "execute(\"ToggleTerm\")" && nvim -u NONE --server $NVIM --remote {{filename}} && nvim -u NONE --server $NVIM --remote-expr "execute(\"normal {{line}}gg\")"; }'
customCommands:
  - key: "<c-r>"
    command: "gh pr create --fill --web"
    context: "global"
  - key: "<c-f>"
    command: "ruff check --fix --select I,W291,W292,W293,Q000 $(git diff --cached --name-only|tr '\n' ' ') --unsafe-fixes && ruff format --line-length 120 $(git diff --cached --name-only|tr '\n' ' ')"
    context: "global"

  - key: "D"
    command: "git diff | diffnav"
    context: "files"
    subprocess: true
    description: "Open unstaged diff in diffnav"
  - key: "D"
    command: "git show {{.SelectedLocalCommit.Sha}} | diffnav"
    context: "commits"
    subprocess: true
    description: "Open commit diff in diffnav"
  - key: "D"
    command: "git diff {{.SelectedLocalBranch.Name}}...HEAD | diffnav"
    context: "localBranches"
    subprocess: true
    description: "Open PR-style diff (branch...HEAD) in diffnav"
